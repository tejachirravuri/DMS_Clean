project:
  run_name: expanded_small_v2
  feature_version: v1
  target_version: v2
  reference_mode: s_pseudo_oracle

paths:
  output_root: /home/gchi/thesis_data/offline_outputs
  frame_dirname: frames

sources:
  - dataset: expanded_small
    material: glass
    video_dir: /home/gchi/thesis_data/raw_videos/glass
    video_glob: "glass_ins.mp4"
    weights_n: /home/gchi/DMS_Clean/models/glass_y8n_fast.pt
    weights_s: /home/gchi/DMS_Clean/models/glass_y8s_accurate.pt

  - dataset: expanded_small
    material: glass
    video_dir: /home/gchi/thesis_data/raw_videos/glass
    video_glob: "20190912-233.mp4"
    weights_n: /home/gchi/DMS_Clean/models/glass_y8n_fast.pt
    weights_s: /home/gchi/DMS_Clean/models/glass_y8s_accurate.pt

  - dataset: expanded_small
    material: porcelain
    video_dir: /home/gchi/thesis_data/raw_videos/porcelain
    video_glob: "porce.mp4"
    weights_n: /home/gchi/DMS_Clean/models/porcelain_y8n_fast.pt
    weights_s: /home/gchi/DMS_Clean/models/porcelain_y8s_accurate.pt

  - dataset: expanded_small
    material: porcelain
    video_dir: /home/gchi/thesis_data/raw_videos/porcelain
    video_glob: "UAV_porcelain.mp4"
    weights_n: /home/gchi/DMS_Clean/models/porcelain_y8n_fast.pt
    weights_s: /home/gchi/DMS_Clean/models/porcelain_y8s_accurate.pt

frame_sampling:
  stride: 60
  max_frames_per_video: 12
  jpeg_quality: 90
  overwrite_existing_frames: false

inference:
  device: cpu
  imgsz: 640
  conf: 0.001
  iou: 0.45
  conf_summary_threshold: 0.25

matching:
  iou_match_threshold: 0.5

runtime:
  save_config_snapshot: true
  save_environment: true
  timestamp_utc: true
