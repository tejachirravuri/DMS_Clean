project:
  run_name: smoke_test_v1
  feature_version: v1
  target_version: v1
  reference_mode: s_pseudo_oracle

paths:
  output_root: thesis_offline_validation/outputs
  frame_dirname: frames

sources:
  - dataset: smoke_test
    material: glass
    video_dir: MT_Chirravuri/input_videos/glass_insulator_videos
    video_glob: "glass_ins.mp4"
    weights_n: DMS_Raptor/models/glass_y8n_fast.pt
    weights_s: DMS_Raptor/models/glass_y8s_accurate.pt
  - dataset: smoke_test
    material: porcelain
    video_dir: MT_Chirravuri/input_videos/porcelain_insulator_videos
    video_glob: "porce.mp4"
    weights_n: DMS_Raptor/models/porcelain_y8n_fast.pt
    weights_s: DMS_Raptor/models/porcelain_y8s_accurate.pt

frame_sampling:
  stride: 120
  max_frames_per_video: 6
  jpeg_quality: 90
  overwrite_existing_frames: false

inference:
  device: cpu
  imgsz: 640
  conf: 0.001
  iou: 0.45
  conf_summary_threshold: 0.25

matching:
  iou_match_threshold: 0.5

runtime:
  save_config_snapshot: true
  save_environment: true
  timestamp_utc: true

